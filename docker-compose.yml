version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: kaka-quant-backend
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./storage:/app/storage
    ports:
      - "8000:8000"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_BASE_URL: /api
    container_name: kaka-quant-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
